<!DOCTYPE html>
<html>
<head>
  <title>Her Herd Maternity Services Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .layout {
      display: flex;
      height: 100%;
      width: 100%;
    }

    .sidebar {
      width: 330px;
      background: #ffffff;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 14px;
      box-sizing: border-box;
      z-index: 999;
    }

    .sidebar h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .service-card {
      border: 1px solid #ddd;
      border-left: 8px solid #999;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      background: #fafafa;
      transition: 0.2s;
    }

    .service-card:hover {
      background: #f0f0f0;
      transform: translateX(3px);
    }

    .service-card h3 {
      margin: 0 0 6px;
      font-size: 15px;
    }

    .service-card p {
      margin: 0 0 4px;
      font-size: 13px;
      color: #555;
    }

    .card-green { border-left-color: #2e7d32; }
    .card-yellow { border-left-color: #f9a825; }
    .card-red { border-left-color: #c62828; }
    .card-grey { border-left-color: #757575; }

    #map {
      flex: 1;
      height: 100%;
    }

    .status-pin {
      width: 42px;
      height: 42px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.6s infinite;
    }

    .status-pin span {
      transform: rotate(45deg);
      font-size: 22px;
    }

    .green { background: #2e7d32; }
    .yellow { background: #f9a825; }
    .red { background: #c62828; }
    .grey { background: #757575; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0,0,0,0.35); }
      70% { box-shadow: 0 0 0 16px rgba(0,0,0,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    }

    .popup-content {
      width: 250px;
      max-height: 240px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .status-label {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .status-green { background: #2e7d32; }
    .status-yellow { background: #f9a825; color: #222; }
    .status-red { background: #c62828; }
    .status-grey { background: #757575; }

    .profile-link {
      display: inline-block;
      margin-top: 8px;
      color: #1565c0;
      font-weight: bold;
      text-decoration: none;
    }

    .empty-message {
      font-size: 14px;
      color: #666;
      line-height: 1.4;
    }

    @media (max-width: 700px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 220px;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      #map {
        height: calc(100% - 220px);
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <div class="sidebar">
      <h2>Maternity Services</h2>
      <div id="serviceList">
        <p class="empty-message">Loading services...</p>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map("map").setView([-30.5156, 151.6664], 8);

    const streetMap = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    });

    const darkMap = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
    });

    const satelliteMap = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      attribution: "Tiles &copy; Esri"
    });

    streetMap.addTo(map);

    L.control.layers({
      "Street Map": streetMap,
      "Dark Map": darkMap,
      "Satellite Map": satelliteMap
    }).addTo(map);

    const markers = {};
    const serviceList = document.getElementById("serviceList");

    function safeText(value, fallback = "") {
      return value || fallback;
    }

    function getStatusIcon(status) {
      const safeStatus = status || "grey";

      return L.divIcon({
        html: `
          <div class="status-pin ${safeStatus}">
            <span>🏥</span>
          </div>
        `,
        className: "",
        iconSize: [42, 42],
        iconAnchor: [21, 42],
        popupAnchor: [0, -42]
      });
    }

    function createPopup(service) {
      const status = safeText(service.status, "grey");
      const statusText = safeText(service.status_text, "Unknown / not yet verified");
      const lastChecked = safeText(service.last_checked, "Not checked yet");
      const notes = safeText(service.notes, "No notes available.");
      const profileUrl = safeText(service.profile_url, "#");

      return `
        <div class="popup-content">
          <h3>${service.name}</h3>
          <div class="status-label status-${status}">
            ${statusText}
          </div>
          <p><strong>Last checked:</strong><br>${lastChecked}</p>
          <p><strong>Notes:</strong><br>${notes}</p>
          <a class="profile-link" href="${profileUrl}">
            View full service profile
          </a>
        </div>
      `;
    }

    function createSidebarCard(service, index) {
      const status = safeText(service.status, "grey");
      const statusText = safeText(service.status_text, "Unknown / not yet verified");
      const lastChecked = safeText(service.last_checked, "Not checked yet");

      const card = document.createElement("div");
      card.className = `service-card card-${status}`;

      card.innerHTML = `
        <h3>${service.name}</h3>
        <p><strong>Status:</strong> ${statusText}</p>
        <p><strong>Last checked:</strong> ${lastChecked}</p>
      `;

      card.addEventListener("click", function() {
        const coords = [Number(service.latitude), Number(service.longitude)];

        map.flyTo(coords, 14, {
          duration: 1.2
        });

        setTimeout(function() {
          markers[index].openPopup();
        }, 700);
      });

      return card;
    }

    async function loadServices() {
      try {
        const response = await fetch("data/services.json?cache=" + Date.now());

        if (!response.ok) {
          serviceList.innerHTML = `<p class="empty-message">Could not load service data.</p>`;
          return;
        }

        const services = await response.json();

        const publicServices = services.filter(function(service) {
          return service.is_public === true;
        });

        serviceList.innerHTML = "";

        if (publicServices.length === 0) {
          serviceList.innerHTML = `
            <p class="empty-message">
              No public maternity services available yet.
            </p>
          `;
          return;
        }

        const bounds = [];

        publicServices.forEach(function(service, index) {
          const lat = Number(service.latitude);
          const lng = Number(service.longitude);

          if (Number.isNaN(lat) || Number.isNaN(lng)) {
            return;
          }

          const coords = [lat, lng];
          bounds.push(coords);

          const marker = L.marker(coords, {
            icon: getStatusIcon(service.status)
          }).addTo(map);

          marker.bindPopup(createPopup(service));

          marker.on("mouseover", function() {
            this.openPopup();
          });

          marker.on("click", function() {
            this.openPopup();
          });

          markers[index] = marker;
          serviceList.appendChild(createSidebarCard(service, index));
        });

        if (bounds.length > 0) {
          map.fitBounds(bounds, {
            padding: [40, 40]
          });
        }

      } catch (error) {
        console.error(error);
        serviceList.innerHTML = `
          <p class="empty-message">
            Error loading services. Check data/services.json.
          </p>
        `;
      }
    }

    loadServices();
  </script>
</body>
</html>
